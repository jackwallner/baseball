name: StatScout
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  lastUpgradeCheck: "1600"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  StatScout:
    type: application
    platform: iOS
    sources:
      - path: StatScout
    resources:
      - StatScout/PrivacyInfo.xcprivacy
    settings:
      base:
        DEVELOPMENT_TEAM: YXG4MP6W39
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.baseball
        PRODUCT_NAME: "Baseball Savvy StatScout"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "30"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: StatScout/Info.plist
        CODE_SIGN_ENTITLEMENTS: StatScout/StatScout.entitlements
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          SUPABASE_URL: $(SUPABASE_URL)
          SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        Release:
          PROVISIONING_PROFILE_SPECIFIER: $(PROVISIONING_PROFILE_SPECIFIER)
          SUPABASE_URL: $(SUPABASE_URL)
          SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    preBuildScripts:
      - name: Pre-build validation
        script: |
          if ! command -v xcodegen &> /dev/null; then
            echo "warning: xcodegen not found. Install via 'brew install xcodegen'."
          fi
          if [ -z "$SUPABASE_URL" ]; then
            echo "error: SUPABASE_URL not set."
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "error: SUPABASE_ANON_KEY not set."
            exit 1
          fi
    entitlements:
      path: StatScout/StatScout.entitlements
    dependencies:
      - sdk: XCTest.framework
        weak: true

  StatScoutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StatScoutTests
    dependencies:
      - target: StatScout
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Baseball Savvy StatScout.app/Baseball Savvy StatScout"

schemes:
  StatScout:
    build:
      targets:
        StatScout: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - StatScoutTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
