name: StatScout
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  lastUpgradeCheck: "1600"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  StatScout:
    type: application
    platform: iOS
    sources:
      - path: StatScout
    settings:
      base:
        DEVELOPMENT_TEAM: YXG4MP6W39
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.baseball
        PRODUCT_NAME: "Baseball Savvy StatScout"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: $(SRCROOT)/StatScout/Info.plist
        CODE_SIGN_ENTITLEMENTS: StatScout/StatScout.entitlements
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "iPhone Developer"
        Release:
          CODE_SIGN_IDENTITY: "iPhone Distribution"
          PROVISIONING_PROFILE_SPECIFIER: $(PROVISIONING_PROFILE_SPECIFIER)
    buildScripts:
      - name: Pre-build validation
        script: |
          if ! command -v xcodegen &> /dev/null; then
            echo "warning: xcodegen not found. Install via 'brew install xcodegen'."
          fi
          if [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "warning: SUPABASE_ANON_KEY not set. StatScoutApp will fatalError at launch."
          fi
    entitlements:
      path: StatScout/StatScout.entitlements
    dependencies:
      - sdk: XCTest.framework
        weak: true

  StatScoutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StatScoutTests
    dependencies:
      - target: StatScout

packages:
  # Placeholder for future SPM dependencies (e.g., Kingfisher for image caching)
